services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: personal_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tasks-service:
    build: ./tasks-service
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - db

  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - tasks-service

volumes:
  pgdata:
